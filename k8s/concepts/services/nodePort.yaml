apiVersion: v1
kind: Service
metadata:
  name: nodeport-svc
  labels:
    env: demo
spec:
  type: NodePort
  ports:
    - nodePort: 30001
      port: 80
      targetPort: 80
  selector:
    env: demo

---
# kubectl create service nodeport nodeport-svc --tcp=80:8080 --dry-run=client -o yaml
apiVersion: v1
kind: Service
metadata:
  name: nodeport-svc
  labels:
    env: demo
spec:
  type: NodePort
  ports:
    - name: 80-8080
      nodePort: 30001
      port: 80
      targetPort: 80
